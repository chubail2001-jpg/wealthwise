# Server
server.port=8080

# SQLite Database
spring.datasource.url=jdbc:sqlite:./data/wealthwise.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT — override JWT_SECRET env var in production
app.jwt.secret=${JWT_SECRET:WealthWise-Super-Secret-Key-2024-Min64CharsRequired!!!!!!!!!!!!!!!!!}
app.jwt.expiration=86400000

# CORS — comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.wealthwise=INFO
